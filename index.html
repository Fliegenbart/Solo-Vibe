<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solo-Vibe — Documentation</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #222;
      --text: #e0e0e0;
      --text-muted: #777;
      --accent: #c084fc;
      --accent-dim: #7c3aed;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    nav {
      width: 260px;
      min-width: 260px;
      border-right: 1px solid var(--border);
      padding: 32px 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
      background: var(--bg);
      z-index: 10;
    }

    nav .logo {
      padding: 0 24px 24px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    nav .logo span {
      color: var(--text-muted);
      font-weight: 400;
      font-size: 12px;
      display: block;
      margin-top: 4px;
    }

    nav a {
      display: block;
      padding: 10px 24px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.15s;
      border-left: 3px solid transparent;
    }

    nav a:hover {
      color: var(--text);
      background: var(--surface-hover);
    }

    nav a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--surface);
    }

    nav .section-label {
      padding: 20px 24px 6px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    main {
      margin-left: 260px;
      flex: 1;
      max-width: 820px;
      padding: 48px 56px 120px;
    }

    .content h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      color: #fff;
    }

    .content h2 {
      font-size: 22px;
      font-weight: 600;
      margin-top: 48px;
      margin-bottom: 16px;
      color: #fff;
    }

    .content h3 {
      font-size: 17px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 12px;
      color: var(--accent);
    }

    .content p {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 16px;
      color: var(--text);
    }

    .content ul, .content ol {
      margin-bottom: 16px;
      padding-left: 24px;
    }

    .content li {
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 6px;
    }

    .content strong {
      color: #fff;
      font-weight: 600;
    }

    .content code {
      background: var(--surface);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--accent);
    }

    .content pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .content pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .content th {
      text-align: left;
      padding: 10px 14px;
      border-bottom: 2px solid var(--border);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .content td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .content tr:hover td {
      background: var(--surface);
    }

    .content blockquote {
      border-left: 3px solid var(--accent-dim);
      padding: 12px 20px;
      margin-bottom: 16px;
      background: var(--surface);
      border-radius: 0 8px 8px 0;
      color: var(--text-muted);
      font-style: italic;
    }

    .content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    @media (max-width: 900px) {
      nav { display: none; }
      main { margin-left: 0; padding: 24px 20px 80px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo">
      Solo-Vibe
      <span>Documentation</span>
    </div>

    <div class="section-label">Product</div>
    <a href="#" data-doc="product-overview" class="active">Overview</a>
    <a href="#" data-doc="mvp-scope">MVP Scope</a>
    <a href="#" data-doc="demo">Demo</a>

    <div class="section-label">Technical</div>
    <a href="#" data-doc="architecture">Architecture</a>
    <a href="#" data-doc="security">Security</a>

    <div class="section-label">Planning</div>
    <a href="#" data-doc="roadmap">Roadmap</a>
    <a href="#" data-doc="language-system">Language System</a>
    <a href="#" data-doc="brand-narrative">Brand Narrative</a>
  </nav>

  <main>
    <div class="content" id="content"></div>
  </main>

  <script>
    const contentEl = document.getElementById('content');
    const links = document.querySelectorAll('nav a[data-doc]');

    async function loadDoc(name) {
      try {
        const res = await fetch(`docs/${name}.md`);
        const md = await res.text();
        contentEl.innerHTML = marked.parse(md);
        window.scrollTo(0, 0);

        links.forEach(l => l.classList.remove('active'));
        document.querySelector(`[data-doc="${name}"]`)?.classList.add('active');
      } catch (e) {
        contentEl.innerHTML = `<h1>Fehler</h1><p>Dokument konnte nicht geladen werden.</p>`;
      }
    }

    links.forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        loadDoc(link.dataset.doc);
      });
    });

    loadDoc('product-overview');
  </script>
</body>
</html>
